async function claude(messages,system,max){const {ok,d}=await api({model:S.engine,max_tokens:max||3000,system,messages});if(d.error)throw new Error(d.error.message||d.error);if(!ok)throw new Error("HTTP");return (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");}
function parseJSON(t){t=t.replace(/```json|```/g,"").trim();const a=t.indexOf("{"),b=t.lastIndexOf("}");if(a>=0)t=t.slice(a,b+1);return JSON.parse(t);}
function imgBlock(dataUrl){const m=dataUrl.match(/^data:(image\/\w+);base64,(.+)$/);return m?{type:"image",source:{type:"base64",media_type:m[1],data:m[2]}}:null;}
function fitImage(dataUrl,maxEdge){return new Promise(function(res){var im=new Image();im.onload=function(){var w=im.width,h=im.height,s=Math.min(1,(maxEdge||1568)/Math.max(w,h));var cv=document.createElement("canvas");cv.width=Math.round(w*s);cv.height=Math.round(h*s);cv.getContext("2d").drawImage(im,0,0,cv.width,cv.height);res(cv.toDataURL("image/jpeg",0.85));};im.src=dataUrl;});}

function viewAgent(){
 let r='<div class="card"><h2>'+tr("navAgent")+'</h2><div class="chat" id="chat">';
 if(!S.chat.length)r+='<div class="msg a">'+(LANG==="de"?"Hi, ich bin dein Prompto-Regisseur. Ich behalte Stil, Handlung und Clips im Blick und helfe dir mit Rat. Was planen wir?":"Hi, I'm your Prompto director. I keep track of style, story and clips and help with advice. What are we planning?")+'</div>';
 S.chat.forEach(m=>r+='<div class="msg '+(m.role==="user"?"u":"a")+'">'+esc(m.content)+'</div>');
 r+='</div><div class="chatbar"><input type="text" id="cin" placeholder="'+tr("agentPlaceholder")+'"/><button class="btn" id="csend" style="width:auto;padding:12px 18px">'+tr("send")+'</button></div><div id="aErr" class="x-err"></div></div>';
 return r;
}
function wireAgent(){const inp=$("cin");$("csend").onclick=sendAgent;inp.onkeydown=e=>{if(e.key==="Enter")sendAgent();};const ch=$("chat");ch.scrollTop=ch.scrollHeight;}
function agentSys(){const want=MODELS.filter(m=>S.models[m[0]]).map(m=>m[0]).join(", ")||"—";
 return "You are the PROMPTO85 Agent — a warm, sharp AI film-director assistant who keeps an overview of the user's project and helps with practical, expert advice on cinematography, prompting, style and the per-model workflow. Reply in "+(LANG==="de"?"GERMAN":"ENGLISH")+", concise and friendly. Prompts you suggest stay in English; ad copy in the brand language. You advise and can tell the user which tab/button to use, but you don't execute actions yourself. PROJECT STATE — story: "+(story()||"—")+"; style: "+styleTok()+"; character DNA: "+(S.dna||"—")+"; target models: "+want+"; format: "+S.aspect+"; brand language: "+S.brand+"; storyboard loaded: "+(S.sbImage?"yes":"no")+"; plan made: "+(S.plan?"yes ("+(S.plan.clips||[]).length+" clips)":"no")+".";}
async function sendAgent(){const inp=$("cin");const q=inp.value.trim();if(!q)return;inp.value="";S.chat.push({role:"user",content:q});render();
 const hist=S.chat.map(m=>({role:m.role,content:m.content}));
 try{const txt=await claude(hist,agentSys(),1500);S.chat.push({role:"assistant",content:txt});render();}
 catch(e){S.chat.push({role:"assistant",content:"⚠ "+e.message+" — "+tr("backendHint")});render();}
}

/* ---- utils ---- */
function esc(s){return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function cp(t,btn){navigator.clipboard&&navigator.clipboard.writeText(t);const o=btn.textContent;btn.textContent=tr("copied");setTimeout(()=>btn.textContent=o,1100);}
</script>
